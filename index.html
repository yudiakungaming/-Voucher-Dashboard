<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Voucher - FinanceSync Pro</title>
    
    <!-- Link ke CSS terpisah -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard Voucher</h1>
            <p>FinanceSync Pro - Rekap Data Real-time</p>
        </div>
        
        <!-- Card Statistik -->
        <div class="stats">
            <div class="stat-card">
                <h3>Total Voucher</h3>
                <div class="number" id="totalVoucher">-</div>
            </div>
            <div class="stat-card total">
                <h3>Total Nominal</h3>
                <div class="number" id="totalNominal">-</div>
            </div>
            <div class="stat-card">
                <h3>Rata-rata</h3>
                <div class="number" id="rataRata">-</div>
            </div>
        </div>
        
        <!-- Tabel Data -->
        <div class="content">
            <h2>📋 Detail Data Voucher</h2>
            <div id="loading" class="loading">⏳ Loading data...</div>
            <div id="error" class="error" style="display: none;"></div>
            <div id="tableContainer"></div>
        </div>
    </div>

    <!-- Link ke JavaScript terpisah -->
    <script src="script.js"></script>
</body>
</html>
