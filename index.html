<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Voucher - FinanceSync Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-card h3 {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card.total .number {
            color: #f093fb;
        }
        
        .content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #667eea;
            font-size: 1.2em;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #667eea;
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85em;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            table {
                font-size: 0.9em;
            }
            
            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Dashboard Voucher</h1>
            <p>FinanceSync Pro - Rekap Data Real-time</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Voucher</h3>
                <div class="number" id="totalVoucher">-</div>
            </div>
            <div class="stat-card total">
                <h3>Total Nominal</h3>
                <div class="number" id="totalNominal">-</div>
            </div>
            <div class="stat-card">
                <h3>Rata-rata</h3>
                <div class="number" id="rataRata">-</div>
            </div>
        </div>
        
        <div class="content">
            <h2 style="margin-bottom: 20px; color: #333;">📋 Detail Data Voucher</h2>
            <div id="loading" class="loading">⏳ Loading data dari spreadsheet...</div>
            <div id="error" style="display: none;"></div>
            <div id="tableContainer" style="display: none;"></div>
        </div>
    </div>

    <script>
        // Ganti dengan URL Apps Script Anda
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyd2POlhgSzjdgJ1tYlq8JxRwJ9g2Oq8IDuB1jAObqLGdLi1XFNBdpceroV0GBRAyjk/exec';

        async function fetchData() {
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                
                console.log('Data received:', data);
                
                // Sesuaikan dengan struktur data dari Apps Script Anda
                // Jika data langsung array:
                const vouchers = Array.isArray(data) ? data : (data.data || data.records || []);
                
                displayData(vouchers);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    ❌ Error mengambil data: ${error.message}<br>
                    <small>Pastikan Apps Script Anda mengembalikan JSON dan sudah di-deploy sebagai Web App</small>
                `;
            }
        }

        function displayData(vouchers) {
            document.getElementById('loading').style.display = 'none';
            
            if (!vouchers || vouchers.length === 0) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = '⚠️ Tidak ada data ditemukan';
                return;
            }
            
            // Hitung statistik
            const totalVoucher = vouchers.length;
            const totalNominal = vouchers.reduce((sum, v) => {
                // Sesuaikan nama field dengan kolom di spreadsheet Anda
                const nominal = parseFloat(v.Jumlah) || parseFloat(v.Nominal) || parseFloat(v.total) || parseFloat(v.jumlah) || 0;
                return sum + nominal;
            }, 0);
            const rataRata = totalNominal / totalVoucher;
            
            // Tampilkan statistik
            document.getElementById('totalVoucher').textContent = totalVoucher.toLocaleString();
            document.getElementById('totalNominal').textContent = 'Rp ' + totalNominal.toLocaleString('id-ID');
            document.getElementById('rataRata').textContent = 'Rp ' + Math.round(rataRata).toLocaleString('id-ID');
            
            // Buat tabel
            const headers = Object.keys(vouchers[0]);
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            ${headers.map(h => `<th>${h}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${vouchers.map(row => `
                            <tr>
                                ${headers.map(h => `<td>${row[h] || '-'}</td>`).join('')}
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            document.getElementById('tableContainer').innerHTML = tableHTML;
            document.getElementById('tableContainer').style.display = 'block';
        }

        // Load data saat halaman dibuka
        fetchData();
    </script>
</body>
</html>
